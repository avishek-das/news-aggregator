services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: news_aggregator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/news_aggregator
      SUPABASE_URL: ${SUPABASE_URL:-https://placeholder.supabase.co}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-placeholder}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-placeholder}
      CORS_ORIGINS: '["http://localhost:3000"]'
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
